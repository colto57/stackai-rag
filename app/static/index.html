<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackAI RAG Chat</title>
    <style>
      :root {
        --bg: #0b1220;
        --bg-soft: #121a2b;
        --card: #111a2e;
        --card-border: #24324e;
        --text: #e5e7eb;
        --text-soft: #9ca3af;
        --primary: #4f8cff;
        --primary-hover: #3f77df;
        --secondary: #334155;
        --secondary-hover: #3f4f66;
        --bubble-user: #1d3f72;
        --bubble-bot: #2b2a4a;
        --ok: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 15% 15%, #1f2a44 0%, var(--bg) 45%),
          radial-gradient(circle at 85% 85%, #16243a 0%, var(--bg) 40%);
        color: var(--text);
      }
      .container {
        max-width: 1040px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .panel {
        background: linear-gradient(165deg, rgba(21, 32, 55, 0.95), rgba(13, 22, 40, 0.95));
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 18px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        letter-spacing: 0.2px;
      }
      .sub {
        margin: 0 0 14px;
        color: var(--text-soft);
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .upload-controls {
        margin-bottom: 8px;
      }
      .hidden-input {
        display: none;
      }
      .file-picker-label {
        border: 1px solid #3d4f70;
        border-radius: 10px;
        padding: 11px 16px;
        background: rgba(17, 26, 46, 0.95);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.08s ease, border-color 0.2s ease;
      }
      .file-picker-label:hover {
        transform: translateY(-1px);
        border-color: #5d78a8;
      }
      input[type="text"], textarea {
        width: 100%;
        border: 1px solid #3d4f70;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        color: var(--text);
        background: var(--bg-soft);
      }
      textarea::placeholder {
        color: #8fa2c0;
      }
      input[type="file"] {
        color: var(--text);
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 16px;
        background: var(--primary);
        color: white;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.08s ease, background 0.2s ease;
      }
      button:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      button:disabled {
        background: #64748b;
        cursor: not-allowed;
      }
      #chatLog {
        height: 460px;
        overflow-y: auto;
        background: rgba(8, 13, 24, 0.58);
        border-radius: 12px;
        border: 1px solid #2f3f5f;
        padding: 12px;
      }
      .msg {
        margin-bottom: 12px;
        padding: 11px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
      }
      .msg.user {
        background: var(--bubble-user);
        border-color: #3f65a1;
      }
      .msg.bot {
        background: var(--bubble-bot);
        border-color: #4a4872;
      }
      .meta {
        color: var(--text-soft);
        font-size: 12px;
        margin-top: 4px;
      }
      .secondary-btn {
        background: var(--secondary);
      }
      .secondary-btn:hover:not(:disabled) {
        background: var(--secondary-hover);
      }
      .file-list {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(11, 18, 32, 0.55);
        border: 1px solid #2f3f5f;
        max-height: 140px;
        overflow-y: auto;
        font-size: 13px;
      }
      .selected-files {
        margin-top: 10px;
      }
      .hint {
        color: var(--text-soft);
        font-size: 12px;
        margin-top: 6px;
      }
      .status-warn {
        color: #fbbf24;
      }
      .file-item {
        margin-bottom: 7px;
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(26, 37, 60, 0.8);
        border: 1px solid #314262;
      }
      pre {
        white-space: pre-wrap;
        margin: 0;
        line-height: 1.45;
      }
      .msg-content {
        line-height: 1.55;
        font-size: 14px;
      }
      .msg-content p {
        margin: 0 0 10px;
      }
      .msg-content p:last-child {
        margin-bottom: 0;
      }
      .msg-content ul,
      .msg-content ol {
        margin: 8px 0 10px 20px;
        padding: 0;
      }
      .msg-content li {
        margin: 4px 0;
      }
      .msg-content strong {
        color: #ffffff;
      }
      .composer {
        margin-top: 10px;
      }
      .ask-btn {
        min-width: 74px;
        align-self: stretch;
      }
      .status-ok {
        color: var(--ok);
      }
      @media (max-width: 720px) {
        .ask-btn {
          width: 100%;
          align-self: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <h1>StackAI RAG Chat</h1>
        <p class="sub">Upload PDFs, query your knowledge base, and manage in-memory files.</p>
        <div class="row upload-controls">
          <label for="pdfInput" class="file-picker-label">Choose Files</label>
          <input id="pdfInput" class="hidden-input" type="file" accept=".pdf" multiple />
          <button id="uploadBtn">Upload PDFs</button>
          <button id="clearFilesBtn" class="secondary-btn">Clear Files</button>
        </div>
        <div id="selectedSummary" class="meta">Pending upload: 0 files</div>
        <div id="selectedFileList" class="file-list selected-files">No files selected for upload.</div>
        <div class="hint">Tip: you can click "Choose Files" multiple times to keep adding files before uploading.</div>
        <div id="uploadStatus" class="meta"></div>
        <div id="memorySummary" class="meta"></div>
        <div id="memoryFileList" class="file-list"></div>
      </div>

      <div class="panel">
        <div id="chatLog"></div>
        <div class="row composer">
          <textarea id="queryInput" rows="2" placeholder="Ask something about uploaded PDFs..."></textarea>
          <button id="askBtn" class="ask-btn">Ask</button>
        </div>
      </div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
